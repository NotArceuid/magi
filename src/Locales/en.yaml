leveling:
  offense:
    title: Offense
    upgrades:
      - name: Punch
        description: Randomly fling your arms around, hoping that it lands.. which it prob won't.
      - name: Kick
        description: Sign up for taekwondo classes, Unlocking two extra limbs for combat :)
      - name: Strike
        description: Strike your enemies!!
      - name: Elbow
        description: Learn how to use your elbows, allowing for even closer attacks.
      - name: Sweep
        description: Use your legs to make your enemies lose balance and fall.
      - name: Parry
        description: Parry your enemies' attack, allowing for a chance to reposte.
  defence:
    title: Defence
    upgrades:
      - name: Dodge
        description: Don't you dare go hollow.
      - name: Flexibility
        description: All those conditioning must've made your muscle go stiff. This fixes it!!
      - name: Block
        description: Block your next attack, thus reducing damage.
      - name: Conditioning
        description: Harden your skin and bones, Making it as though as iron.
      - name: Footwork
        description: Become more stable, and be less susceptible to enemy attacks.
      - name: Lock
        description: Lock your enemies, making them unable to move or counter attack. Jiu jitsu style.
  requirement: "{amount} {prev} Needed"

skills: 
  fire_crimson: 
    name: Fire Crimson 
    description: Fire a bullet imbued with the scorching heat of Crimson Source. The searing pain caused by the bullet will surely burn away all foe in your path.
  fire_purity: 
    name: Click me!
    description: | 
      Fire a bullet of pure source. For the light of source shines luminously as it descends to become one of the four rays. blah blah balh... 

      Click this do damage ok?
    inactive_description: How tf did you find this????????/
    skill_info: Damage
  attack: 
    name: Attack 
    description: How tf did you managed to access this??
  block: 
    name: Block 
    description: |
      Block the enemy's attack, reducing incoming damage by 40%. Time the block right to parry.

      On parry: Reduce incoming damage by 60% and fire once ignoring any cooldowns.

      Dear oh dear.. what was it, the hunt? No matter. 

  switch_purity: 
    name: Attune Purity
    description: |
      The white light glimers upon the mark inscribed on your left hand. Undifferentiated and neutral. It is the pure source of which all inhabitants of Lemia seeks.

      Press this to switch (or if you are a lore GEEK 🤓), attune to Purity. Currently it doesn't do anything if you havent unlocked other rays though. 

    inactive_description: stinky smelly nerds 
    skill_info: 
  none: |
    You have NOT selected a skill, You see that BIG ROUND button up there??? click it. to start dealing damage

    mkay :) have fun hehe
